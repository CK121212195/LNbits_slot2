<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ LIGHTNING SLOT ⚡</title>

  <!-- Open Graph / X (Twitter) Cards -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="LIGHTNING SLOT - Bet Sats. Win Sats.">
  <meta property="og:description" content="Deposit Sats via Lightning Network, spin the reels, and withdraw your winnings instantly! ⚡🎰">
  <meta name="twitter:card" content="summary_large_image">

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #F7A800; --gold-dark: #C47F00; --orange: #FF6B00;
      --bg-dark: #0A0A0A; --bg-card: #111111; --bg-reel: #0D0D0D;
      --border: #2A2A2A; --text: #F0EDE6; --muted: #666;
      --green: #00FF88; --red: #FF3B3B; --sat-blue: #4F9CF9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-dark); color: var(--text);
      font-family: 'Share Tech Mono', 'Noto Sans JP', monospace;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      position: relative; overflow-x: hidden;
    }

    .scan-lines {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    }

    .header-bar {
      width: 100%; max-width: 420px; display: flex; justify-content: flex-end;
      padding: 1rem 1rem 0; position: relative; z-index: 2;
    }
    
    select.lang-select {
      background: #181818; color: var(--gold); border: 1px solid var(--border);
      padding: 5px 10px; border-radius: 6px; font-family: 'Share Tech Mono', monospace;
      cursor: pointer; font-size: 12px; outline: none;
    }

    .slot-wrap {
      width: 100%; max-width: 420px; display: flex; flex-direction: column;
      align-items: center; padding: 1rem 1rem 2.5rem; position: relative; z-index: 1;
    }

    .slot-title {
      font-family: 'Press Start 2P', cursive; font-size: 14px; color: var(--gold);
      letter-spacing: 2px; margin-bottom: 0.3rem; text-shadow: 0 0 15px rgba(247,168,0,0.6); text-align: center; line-height: 1.4;
    }

    .slot-subtitle {
      font-size: 10px; color: var(--orange); letter-spacing: 2px; margin-bottom: 1.2rem; text-align: center;
    }

    /* 決済アクションエリア */
    .wallet-actions {
      display: flex; gap: 10px; width: 100%; margin-bottom: 15px;
    }
    .btn-wallet {
      flex: 1; padding: 10px; border: none; border-radius: 8px; font-family: 'Press Start 2P', cursive;
      font-size: 9px; cursor: pointer; transition: 0.2s; box-shadow: 0 3px 0 rgba(0,0,0,0.5);
    }
    .btn-wallet:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.5); }
    .btn-deposit { background: var(--green); color: #000; box-shadow: 0 3px 0 #009955; }
    .btn-withdraw { background: #333; color: var(--text); border: 1px solid var(--border); }
    .btn-withdraw.active { background: var(--red); color: #fff; border-color: var(--red); box-shadow: 0 3px 0 #990000; }

    .machine {
      background: var(--bg-card); border: 1.5px solid var(--border); border-radius: 16px;
      padding: 1.5rem 1.5rem 1.2rem; width: 100%; position: relative;
      box-shadow: 0 0 30px rgba(247,168,0,0.05), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .balance-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.2rem; padding: 0.6rem 1rem; background: #0A0A0A;
      border: 1px solid var(--border); border-radius: 8px;
    }

    .bal-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
    .bal-val { font-family: 'Press Start 2P', monospace; font-size: 11px; color: var(--green); }
    .bal-val span { color: var(--muted); font-size: 8px; margin-left: 4px; }

    .reels-container {
      display: flex; gap: 8px; justify-content: center; margin-bottom: 1rem;
      padding: 0.8rem; background: #080808; border: 1px solid var(--border); border-radius: 10px; position: relative;
    }

    .payline {
      position: absolute; top: 50%; left: 0; right: 0; height: 2px;
      background: rgba(247,168,0,0.25); transform: translateY(-50%); pointer-events: none;
    }

    .reel {
      width: 80px; height: 90px; overflow: hidden; border: 1px solid #1A1A1A;
      border-radius: 8px; background: var(--bg-reel); position: relative;
    }
    .reel-inner { display: flex; flex-direction: column; align-items: center; will-change: transform; }
    .reel-sym { width: 80px; height: 90px; display: flex; align-items: center; justify-content: center; font-size: 38px; flex-shrink: 0; user-select: none; }
    .win-flash { animation: winFlash 0.4s ease 3; }
    @keyframes winFlash { 0%,100% { background: var(--bg-reel); } 50% { background: rgba(247,168,0,0.2); } }

    .bet-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
    .bet-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; flex-shrink: 0; }
    .bet-btn {
      background: #181818; border: 1px solid var(--border); border-radius: 6px; color: var(--text);
      font-family: 'Share Tech Mono', monospace; font-size: 14px; padding: 5px 12px; cursor: pointer; flex-shrink: 0;
    }
    .bet-btn:hover { border-color: var(--gold); color: var(--gold); }
    
    .bet-display {
      flex: 1; text-align: center; font-family: 'Press Start 2P', monospace; font-size: 12px;
      color: var(--gold); background: #0A0A0A; border: 1px solid var(--border); border-radius: 6px; padding: 8px;
    }

    .spin-btn {
      width: 100%; padding: 1.2rem; background: var(--gold); color: #000;
      font-family: 'Press Start 2P', monospace; font-size: 14px; border: none; border-radius: 10px;
      cursor: pointer; letter-spacing: 2px; transition: 0.1s; box-shadow: 0 4px 0 var(--gold-dark);
    }
    .spin-btn:hover { background: #FFB800; transform: translateY(-1px); box-shadow: 0 5px 0 var(--gold-dark); }
    .spin-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--gold-dark); }
    .spin-btn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; transform: none; }

    .result-msg {
      text-align: center; min-height: 32px; margin-top: 1rem; font-family: 'Press Start 2P', monospace;
      font-size: 9px; line-height: 1.8; color: var(--muted);
    }
    .result-msg.win { color: var(--green); text-shadow: 0 0 10px rgba(0,255,136,0.4); }
    .result-msg.lose { color: var(--red); }
    .result-msg.jackpot { color: var(--gold); text-shadow: 0 0 15px rgba(247,168,0,0.6); font-size: 11px; animation: countPop 0.5s infinite alternate; }

    /* モーダルUI */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(4px);
    }
    .modal-box {
      background: #111; border: 1.5px solid var(--gold); border-radius: 12px;
      width: 90%; max-width: 360px; padding: 20px; text-align: center; box-shadow: 0 0 30px rgba(247,168,0,0.2);
    }
    .modal-title { font-family: 'Press Start 2P', monospace; font-size: 11px; color: var(--gold); margin-bottom: 15px; line-height: 1.5;}
    
    .dep-opts { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 15px; }
    .btn-dep-opt { background: #1A1A1A; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; font-family: 'Share Tech Mono', monospace; font-size: 16px; cursor: pointer; transition: 0.2s;}
    .btn-dep-opt:hover { border-color: var(--green); color: var(--green); }

    .qr-img { width: 220px; height: 220px; border: 5px solid #fff; border-radius: 8px; margin: 10px auto; display: block;}
    .inv-text { width: 100%; padding: 10px; background: #000; color: var(--green); border: 1px solid #333; border-radius: 5px; font-family: monospace; font-size: 10px; margin-bottom: 10px; word-break: break-all;}
    .waiting-text { font-size: 12px; color: var(--orange); animation: blink 1s infinite; margin-top: 10px;}

    .input-inv { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid var(--gold); border-radius: 6px; font-family: monospace; font-size: 12px; margin: 15px 0; text-align: center;}
    
    .btn-close { width: 100%; background: #333; color: #fff; border: none; padding: 12px; border-radius: 8px; font-family: 'Press Start 2P', monospace; font-size: 10px; cursor: pointer; margin-top: 10px;}
    .btn-action { width: 100%; background: var(--sat-blue); color: #fff; border: none; padding: 12px; border-radius: 8px; font-family: 'Press Start 2P', monospace; font-size: 10px; cursor: pointer; }

    .paytable {
      width: 100%; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem; margin-top: 1.2rem;
    }
    .paytable-title { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--muted); text-align: center; margin-bottom: 1rem; }
    .pay-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #161616; font-size: 12px; }
    .pay-row:last-child { border-bottom: none; }
    .pay-syms { letter-spacing: 4px; }
    .pay-mult { color: var(--gold); font-family: 'Press Start 2P', monospace; font-size: 9px; }

    @keyframes countPop { 0% { transform: scale(1); } 50% { transform: scale(1.1); color: var(--green); } 100% { transform: scale(1); } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    .confetti-piece {
      position: absolute; width: 8px; height: 8px; border-radius: 1px; pointer-events: none; z-index: 50; animation: confettiFall 1.5s ease-out forwards;
    }
    @keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(250px) rotate(720deg); opacity: 0; } }
  </style>
</head>

<script>
// ==========================================
// 🛑 WARNING: FOR DEMONSTRATION PURPOSES ONLY
// 本番環境では ADMIN_KEY をフロントエンドに絶対に置かないでください。
// 出金(Withdraw) APIを叩けるため、資金が盗まれます。
// バックエンド(GAS等)を経由するアーキテクチャに修正してください。
// ==========================================
const LNBITS_URL = "https://demo.lnbits.com/api/v1/payments";
const LNBITS_INVOICE_KEY = "67e5b0ad270f44d19e6d768bb3314e49"; // 入金確認用 (The Fiat Burnerのキー流用)
const LNBITS_ADMIN_KEY   = "YOUR_ADMIN_KEY_HERE";              // 出金送金用 (本番は隠すこと)

// ---------------------------
// 多言語辞書 (i18n)
// ---------------------------
const i18n = {
  en: {
    title: "⚡ LIGHTNING SLOT ⚡", subtitle: "BET SATS. WIN SATS.",
    balance: "BALANCE", total_won: "TOTAL WON", bet: "BET", spin: "SPIN",
    deposit: "DEPOSIT SATS", withdraw: "WITHDRAW",
    msg_insert: "INSERT SATS TO PLAY", msg_spinning: "⚡ SPINNING ⚡",
    msg_win: "WIN! +", msg_lose: "NO LUCK... KEEP STACKING", msg_jackpot: "⚡ JACKPOT! +",
    paytable_title: "— PAY TABLE —", any_2: "any 2 match",
    modal_deposit_title: "DEPOSIT SATS", modal_waiting: "Waiting for payment...",
    modal_withdraw_title: "WITHDRAW SATS", modal_withdraw_desc: "Paste your Lightning Invoice (bolt11):",
    btn_confirm_withdraw: "SEND SATS", btn_close: "CLOSE",
    err_funds: "NOT ENOUGH SATS", err_withdraw: "Error withdrawing. Check invoice.", success_withdraw: "Withdrawal Successful!"
  },
  ja: {
    title: "⚡ ライトニングスロット ⚡", subtitle: "SATSを入金して回せ。",
    balance: "残高", total_won: "累計獲得", bet: "賭け金", spin: "回す",
    deposit: "入金する", withdraw: "出金する",
    msg_insert: "SATSを入金してプレイ", msg_spinning: "⚡ 回転中 ⚡",
    msg_win: "当たり！ +", msg_lose: "ハズレ... 次へ", msg_jackpot: "⚡ 大当たり！ +",
    paytable_title: "— 配当表 —", any_2: "任意の2つ揃い",
    modal_deposit_title: "入金 (DEPOSIT)", modal_waiting: "支払いを確認中...",
    modal_withdraw_title: "出金 (WITHDRAW)", modal_withdraw_desc: "Lightning Invoice (bolt11) を貼り付け:",
    btn_confirm_withdraw: "送金する", btn_close: "閉じる",
    err_funds: "SATSが不足しています", err_withdraw: "出金エラー。インボイスを確認してください。", success_withdraw: "出金が完了しました！"
  },
  ko: {
    title: "⚡ 라이트닝 슬롯 ⚡", subtitle: "SATS를 걸고, SATS를 따세요.",
    balance: "잔액", total_won: "총 획득", bet: "베팅액", spin: "스핀",
    deposit: "입금하기", withdraw: "출금하기",
    msg_insert: "SATS를 입금하고 플레이", msg_spinning: "⚡ 회전 중 ⚡",
    msg_win: "당첨! +", msg_lose: "꽝... 다시 도전", msg_jackpot: "⚡ 잭팟! +",
    paytable_title: "— 배당표 —", any_2: "아무거나 2개",
    modal_deposit_title: "SATS 입금", modal_waiting: "결제 대기 중...",
    modal_withdraw_title: "SATS 출금", modal_withdraw_desc: "Lightning Invoice (bolt11) 붙여넣기:",
    btn_confirm_withdraw: "송금하기", btn_close: "닫기",
    err_funds: "SATS가 부족합니다", err_withdraw: "출금 오류. 인보이스를 확인하세요.", success_withdraw: "출금이 완료되었습니다!"
  }
};

let currentLang = "en";

function changeLanguage(lang) {
  currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if(i18n[lang][key]) el.innerHTML = i18n[lang][key];
  });
  if(balance === 0 && !isSpinning) setMsg(i18n[lang].msg_insert, '');
}

// ---------------------------
// スロットロジック ＆ 状態
// ---------------------------
const SYMBOLS = ['⚡','₿','🔑','💎','🌕','🔥'];
const WEIGHTS =[2, 5, 8, 10, 15, 20];
const MULTIPLIERS = { '⚡⚡⚡':50, '₿₿₿':20, '🔑🔑🔑':10, '💎💎💎':8, '🌕🌕🌕':5, '🔥🔥🔥':3 };

const BET_LEVELS =[10, 50, 100, 250, 500, 1000];
let betIdx = 0;
let balance = 0;
let totalWon = 0;
let isSpinning = false;
let finalSymbols =['₿','₿','₿'];
let lastWinAmount = 0;

function weightedRand() {
  const total = WEIGHTS.reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  for(let i=0;i<SYMBOLS.length;i++){ r-=WEIGHTS[i]; if(r<=0) return SYMBOLS[i]; }
  return SYMBOLS[SYMBOLS.length-1];
}

function buildReel(id, finalSym) {
  const inner = document.getElementById('inner'+id);
  inner.innerHTML='';
  const before = 15;
  for(let i=0;i<before;i++) {
    const div=document.createElement('div'); div.className='reel-sym'; 
    div.textContent=SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];
    inner.appendChild(div);
  }
  const fDiv=document.createElement('div'); fDiv.className='reel-sym'; fDiv.textContent=finalSym;
  inner.appendChild(fDiv);
  inner.style.transition='none'; inner.style.transform='translateY(0)';
}

function initReels() { for(let i=0;i<3;i++) buildReel(i, finalSymbols[i]); }

function changeBet(dir) {
  if(isSpinning) return;
  betIdx = Math.max(0, Math.min(BET_LEVELS.length-1, betIdx+dir));
  document.getElementById('bet-display').textContent = BET_LEVELS[betIdx].toLocaleString();
}
function setMaxBet() {
  if(isSpinning) return;
  betIdx = BET_LEVELS.length-1;
  document.getElementById('bet-display').textContent = BET_LEVELS[betIdx].toLocaleString();
}

function updateBalance() {
  const el = document.getElementById('balance-display');
  el.innerHTML = balance.toLocaleString()+' <span>SATS</span>';
  document.getElementById('total-won-display').innerHTML = totalWon.toLocaleString()+' <span>SATS</span>';
  
  const wBtn = document.getElementById('btn-withdraw');
  if(balance > 0) wBtn.classList.add('active'); else wBtn.classList.remove('active');
  
  el.classList.remove('counter-anim'); void el.offsetWidth; el.classList.add('counter-anim');
}

function setMsg(text, cls) {
  const el=document.getElementById('result-msg');
  el.textContent=text; el.className='result-msg '+(cls||'');
}

function calcWin(syms, bet) {
  const key = syms.join('');
  if(MULTIPLIERS[key]) return Math.floor(bet * MULTIPLIERS[key]);
  if(syms[0]===syms[1] || syms[1]===syms[2] || syms[0]===syms[2]) return Math.floor(bet*1.5);
  return 0;
}

function spawnConfetti() {
  const colors =['#F7A800','#00FF88','#4F9CF9'];
  const rc = document.getElementById('reels-container');
  const rect = rc.getBoundingClientRect();
  for(let i=0;i<25;i++){
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.left = (rect.width/2 + Math.random()*100 - 50) + 'px';
    el.style.top = '20px';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.transform = `rotate(${Math.random()*360}deg)`;
    el.style.animationDelay = (Math.random()*0.2)+'s';
    rc.appendChild(el);
    setTimeout(()=>el.remove(), 1600);
  }
}

async function spin() {
  const bet = BET_LEVELS[betIdx];
  if(balance < bet){ 
    setMsg(i18n[currentLang].err_funds, 'lose');
    setTimeout(()=>openDeposit(), 1000); // 促す
    return; 
  }
  if(isSpinning) return;
  isSpinning=true;
  document.getElementById('share-btn').style.display = 'none';

  document.getElementById('spin-btn').disabled=true;
  setMsg(i18n[currentLang].msg_spinning, '');

  balance -= bet; updateBalance();
  finalSymbols =[weightedRand(), weightedRand(), weightedRand()];
  const delays =[800, 1200, 1600];

  for(let i=0;i<3;i++) buildReel(i, finalSymbols[i]);
  await new Promise(r=>setTimeout(r,50));

  for(let i=0;i<3;i++){
    const inner=document.getElementById('inner'+i);
    const count=inner.children.length;
    const targetY = -((count-1)*90);
    inner.style.transition='transform '+(delays[i]/1000+0.2)+'s cubic-bezier(0.2, 0.1, 0.1, 1)';
    inner.style.transform=`translateY(${targetY}px)`;
  }

  await new Promise(r=>setTimeout(r,delays[2]+300));

  const win = calcWin(finalSymbols, bet);
  lastWinAmount = win;
  
  if(win>0){
    balance+=win; totalWon+=win; updateBalance();
    for(let i=0;i<3;i++){
      const r=document.getElementById('reel'+i);
      r.classList.remove('win-flash'); void r.offsetWidth; r.classList.add('win-flash');
    }
    spawnConfetti();

    const key=finalSymbols.join('');
    if(MULTIPLIERS[key]===50) setMsg(i18n[currentLang].msg_jackpot + win.toLocaleString()+' SATS', 'jackpot');
    else setMsg(i18n[currentLang].msg_win + win.toLocaleString()+' SATS', 'win');
    
    document.getElementById('share-btn').style.display = 'block';
  } else {
    setMsg(i18n[currentLang].msg_lose, 'lose');
  }

  isSpinning=false;
  document.getElementById('spin-btn').disabled=false;
}

function shareToX() {
  const text = `I just won ${lastWinAmount.toLocaleString()} SATS on Lightning Slot! ⚡🎰\n[ ${finalSymbols.join(' ')} ]\nStacking sats via Lightning Network!\n#Bitcoin #LightningNetwork`;
  const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}

// ---------------------------
// 決済連携 (LNbits)
// ---------------------------
let checkPaymentInterval = null;
let currentHash = "";

function openDeposit() {
  if(isSpinning) return;
  document.getElementById('modal-deposit').style.display = 'flex';
  document.getElementById('dep-selection').style.display = 'block';
  document.getElementById('dep-qr-area').style.display = 'none';
}

function openWithdraw() {
  if(isSpinning) return;
  if(balance <= 0) return alert(i18n[currentLang].err_funds);
  document.getElementById('modal-withdraw').style.display = 'flex';
  document.getElementById('withdraw-input').value = "";
}

function closeModals() {
  document.getElementById('modal-deposit').style.display = 'none';
  document.getElementById('modal-withdraw').style.display = 'none';
  if(checkPaymentInterval) clearInterval(checkPaymentInterval);
}

function createInvoice(amount) {
  document.getElementById('dep-selection').style.display = 'none';
  document.getElementById('dep-qr-area').style.display = 'block';
  document.getElementById('qr-img').src = "";
  document.getElementById('inv-text').value = "Generating...";

  fetch(LNBITS_URL, {
    method: "POST",
    headers: { "X-Api-Key": LNBITS_INVOICE_KEY, "Content-Type": "application/json" },
    body: JSON.stringify({ out: false, amount: amount, memo: `Deposit ${amount} SATS to Lightning Slot` })
  })
  .then(res => res.json())
  .then(data => {
    currentHash = data.payment_hash;
    const inv = data.payment_request;
    document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=lightning:${inv}`;
    document.getElementById('inv-text').value = inv;
    document.getElementById('lightning-link').href = `lightning:${inv}`;

    // スマホユーザー向けにウォレットを自動起動
    if(window.innerWidth < 600) setTimeout(() => { window.location.href = `lightning:${inv}`; }, 500);

    pollPayment(currentHash, amount);
  }).catch(err => {
    alert("Invoice creation failed."); closeModals();
  });
}

function pollPayment(hash, amount) {
  if (checkPaymentInterval) clearInterval(checkPaymentInterval);
  checkPaymentInterval = setInterval(() => {
    fetch(`${LNBITS_URL}/${hash}`, { headers: { "X-Api-Key": LNBITS_INVOICE_KEY } })
    .then(res => res.json())
    .then(data => {
      if (data.paid) {
        clearInterval(checkPaymentInterval);
        balance += amount; updateBalance();
        closeModals();
        setMsg(`+${amount.toLocaleString()} SATS DEPOSITED!`, 'win');
      }
    }).catch(console.error);
  }, 3000);
}

async function executeWithdraw() {
  const inv = document.getElementById('withdraw-input').value.trim();
  if(!inv.startsWith('lnbc')) return alert(i18n[currentLang].err_withdraw);

  const btn = document.getElementById('btn-execute-withdraw');
  btn.disabled = true; btn.innerText = "SENDING...";

  try {
    const res = await fetch(LNBITS_URL, {
      method: "POST",
      headers: { "X-Api-Key": LNBITS_ADMIN_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ out: true, bolt11: inv })
    });
    const data = await res.json();
    
    if(data.payment_hash) {
      alert(i18n[currentLang].success_withdraw);
      balance = 0; updateBalance();
      closeModals();
    } else {
      alert(i18n[currentLang].err_withdraw + "\n" + (data.detail || ""));
    }
  } catch(e) {
    alert("API Error");
  }
  
  btn.disabled = false; btn.innerHTML = `<span data-i18n="btn_confirm_withdraw">${i18n[currentLang].btn_confirm_withdraw}</span>`;
}

// 起動時初期化
initReels();
changeLanguage('en'); // デフォルト言語
</script>
